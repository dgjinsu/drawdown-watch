spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  datasource:
    url: jdbc:postgresql://localhost:5432/drawdown_watch
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-key-that-is-at-least-256-bits-long-for-hs256}
    access-token-expiry: 1800000
    refresh-token-expiry: 604800000
  yahoo-finance:
    base-url: https://query1.finance.yahoo.com/v8/finance/chart
    timeout: 10000
    max-retries: 3
  scheduler:
    krx-cron: "0 0 16 * * MON-FRI"
    us-cron: "0 0 6 * * TUE-SAT"
  notification:
    cooldown-hours: 24
    telegram:
      api-url: https://api.telegram.org
      bot-token: ${TELEGRAM_BOT_TOKEN:}
    slack:
      timeout: 5000

logging:
  level:
    com.example.drawdownwatch: DEBUG
