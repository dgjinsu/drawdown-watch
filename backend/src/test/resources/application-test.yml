spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  jwt:
    secret: test-secret-key-that-is-at-least-256-bits-long-for-hs256-algorithm-testing
    access-token-expiry: 1800000
    refresh-token-expiry: 604800000
  yahoo-finance:
    base-url: https://query1.finance.yahoo.com/v8/finance/chart
    timeout: 10000
    max-retries: 3
  scheduler:
    krx-cron: "0 0 16 * * MON-FRI"
    us-cron: "0 0 6 * * TUE-SAT"
  notification:
    cooldown-hours: 24
    telegram:
      api-url: https://api.telegram.org
      bot-token: test-bot-token
    slack:
      timeout: 5000
