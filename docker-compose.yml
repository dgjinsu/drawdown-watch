services:
  postgres:
    image: postgres:16-alpine
    container_name: drawdown-watch-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: drawdown_watch
      POSTGRES_USER: drawdown_watch_db
      POSTGRES_PASSWORD: rlawlstn
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drawdown_watch_db -d drawdown_watch"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
